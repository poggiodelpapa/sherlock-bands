name: Monitora Pagina Sapienza

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_email:
        description: "Forza l'invio dell'email di test"
        required: false
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cerca l'ultimo hash salvato nelle cache precedenti
      - name: Ripristina hash precedente
        uses: actions/cache/restore@v4
        with:
          path: last_hash.txt
          key: monitor-hash-${{ github.run_id }}
          restore-keys: |
            monitor-hash-

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui monitor
        env:
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Legge la spunta dell'input manuale (sempre 'false' quando gira in automatico col cron)
          FORCE_EMAIL: ${{ inputs.force_email || 'false' }}
        run: python monitor.py

      # Salva il nuovo hash in una nuova cache (se è cambiato o se è la prima volta)
      - name: Salva hash aggiornato
        uses: actions/cache/save@v4
        with:
          path: last_hash.txt
          key: monitor-hash-${{ github.run_id }}
