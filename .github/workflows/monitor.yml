name: Monitora Pagina Sapienza

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_email:
        description: 'Forza invio email di test (anche se non è cambiato nulla)'
        required: false
        default: 'false'
        type: boolean

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ripristina Cache
        uses: actions/cache/restore@v4
        with:
          path: last_hash.txt
          key: last-hash

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui monitor
        env:
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FORCE_EMAIL: ${{ inputs.force_email || 'false' }}
        run: python monitor.py

      - name: Salva Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_hash.txt
          key: last-hash
