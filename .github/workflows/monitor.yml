name: Monitora Pagina Sapienza

on:
  schedule:
    - cron: "0 * * * *"     # ogni ora (puoi cambiarlo, es. ogni 6 ore: "0 */6 * * *")
  workflow_dispatch:        # permette di lanciare manualmente se serve

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui monitor
        env:
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python monitor.py

      - name: Salva hash e contenuto nel repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Crea i file se non esistono (prima esecuzione)
          touch last_hash.txt last_content.txt
          git add last_hash.txt last_content.txt
          git diff --cached --quiet || git commit -m "chore: aggiorna hash e contenuto [skip ci]"
          git push
